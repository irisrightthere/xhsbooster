name: xhsbooster 定时抓取

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      force-asianwiki:
        description: '强制更新AsianWiki'
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - id: check
        run: |
          HOUR_CST=$(TZ='Asia/Shanghai' date +%H)
          if [ "$HOUR_CST" -ge 8 ] || [ "$HOUR_CST" -lt 2 ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "CST hour=$HOUR_CST → 放行"
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "CST hour=$HOUR_CST → 深夜跳过"
          fi

  crawl:
    needs: gate
    if: needs.gate.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore old state from deployed site
        run: |
          mkdir -p gh-pages/_state
          BASE="https://irisrightthere.github.io/xhsbooster/_state"
          for d in $(seq 1 7); do
            DATE=$(date -d "-$d days" +%Y-%m%d 2>/dev/null || date -v-${d}d +%Y-%m%d 2>/dev/null || echo "")
            [ -z "$DATE" ] && continue
            curl -sSf "${BASE}/${DATE}_articles.json" -o "gh-pages/_state/${DATE}_articles.json" 2>/dev/null && echo "✅ restored $DATE" || true
          done
          echo "Local state files:"
          ls gh-pages/_state/*.json 2>/dev/null || echo "(none yet)"

      - name: Clear dedup cache
        run: rm -f gh-pages/_state/dedup.db

      - name: Run pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FORCE_ASIANWIKI: ${{ github.event.inputs.force-asianwiki || 'false' }}
        run: python main.py run

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages
          keep_files: false
