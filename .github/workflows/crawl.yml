name: xhsbooster 定时抓取

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      force-asianwiki:
        description: '强制更新AsianWiki'
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - id: check
        run: |
          HOUR_CST=$(TZ='Asia/Shanghai' date +%H)
          if [ "$HOUR_CST" -ge 8 ] || [ "$HOUR_CST" -lt 2 ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "CST hour=$HOUR_CST → 放行"
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "CST hour=$HOUR_CST → 深夜跳过"
          fi

  crawl:
    needs: gate
    if: needs.gate.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore state from gh-pages branch
        run: |
          mkdir -p gh-pages
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages --depth=1
            git archive origin/gh-pages | tar x -C gh-pages/
            echo "✅ Restored $(ls gh-pages/_state/*_articles.json 2>/dev/null | wc -l) state files from gh-pages"
          else
            echo "📦 No existing gh-pages branch — first deployment"
          fi
          # Remove auto-generated files (will be rebuilt by pipeline)
          rm -f gh-pages/index.html gh-pages/archive.html

      - name: Clear dedup cache
        run: rm -f gh-pages/_state/dedup.db

      - name: Run pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FORCE_ASIANWIKI: ${{ github.event.inputs.force-asianwiki || 'false' }}
        run: python main.py run

      - name: Extract AsianWiki spider data
        run: |
          python3 -c "
          import json, os, sys, re
          from glob import glob

          def is_valid_date(d):
              '''日期必须包含具体月份和日期，拒绝 TBA/待定/纯年份/仅月份。'''
              if not d or not d.strip():
                  return False
              s = str(d).strip()
              # 拒绝 TBA / 待定 / 纯年份 / 英文待定
              if re.search(r'TBA|待定|📌|\b2026\b|unknown|undecided', s, re.IGNORECASE):
                  return False
              # 必须匹配 X月X日（中文）或 Month Day（英文）格式
              if re.search(r'\d{1,2}月\s*\d{1,2}日', s):
                  return True
              if re.search(r'[A-Z][a-z]+\s+\d+', s):
                  return True
              return False

          def is_valid_platform(p):
              '''平台不能是 TBA 或空。'''
              if not p or not str(p).strip():
                  return False
              if re.search(r'^TBA$', str(p), re.IGNORECASE):
                  return False
              return True

          files = sorted(glob('gh-pages/_state/*_articles.json'), reverse=True)
          if not files: sys.exit(0)
          data = json.load(open(files[0]))
          aw = [a for a in data if a.get('source_id') == 'asianwiki']
          if aw:
              out = []
              skipped = 0
              for a in aw:
                  try: extra = json.loads(a.get('content','{}'))
                  except: extra = {}
                  air_date = extra.get('air_date', '')
                  platform = extra.get('platform', '')
                  if not is_valid_date(air_date):
                      skipped += 1
                      continue
                  if not is_valid_platform(platform):
                      skipped += 1
                      continue
                  out.append({
                      'title': a.get('title',''),
                      'url': a.get('url',''),
                      'platform': platform,
                      'date': air_date,
                  })
              json.dump(out, open('gh-pages/_state/spider_data.json','w'), ensure_ascii=False, indent=2)
              print(f'Extracted {len(out)} AW entries (skipped {skipped} TBA/待定)')
          "

      - name: Merge AsianWiki data
        run: python merge_data.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages
          keep_files: false
